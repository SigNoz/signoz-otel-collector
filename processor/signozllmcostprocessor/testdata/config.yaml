# Full valid config — mirrors the spec.
signozllmcost:
  attrs:
    model: "gen_ai.request.model"
    in: "gen_ai.usage.input_tokens"
    out: "gen_ai.usage.output_tokens"
    cache_read: "gen_ai.usage.input_token_details.cached"
    cache_write: "gen_ai.usage.input_token_details.cache_creation"
  default_pricing:
    unit: per_million_tokens
    rules:
      - pattern: "gpt-4o*"
        cache_mode: subtract
        in: 5.0
        out: 15.0
        cache_read: 2.5
        cache_write: 0.0
      - pattern: "claude-*"
        cache_mode: additive
        in: 3.0
        out: 15.0
        cache_read: 0.30
        cache_write: 3.75
  output_attrs:
    in: "_signoz.gen_ai.cost_input"
    out: "_signoz.gen_ai.cost_output"
    cache_read: "_signoz.gen_ai.cost_cache_read"
    cache_write: "_signoz.gen_ai.cost_cache_write"
    total: "_signoz.gen_ai.total_cost"

# Minimal valid — only total output attr required.
signozllmcost/minimal:
  attrs:
    model: "gen_ai.request.model"
    in: "gen_ai.usage.input_tokens"
    out: "gen_ai.usage.output_tokens"
  default_pricing:
    unit: per_million_tokens
    rules:
      - pattern: "*"
        cache_mode: subtract
        in: 1.0
        out: 2.0
        cache_read: 0.0
        cache_write: 0.0
  output_attrs:
    total: "_signoz.gen_ai.total_cost"

# Invalid: missing attrs.model.
signozllmcost/no_model_attr:
  attrs:
    model: ""
    in: "gen_ai.usage.input_tokens"
    out: "gen_ai.usage.output_tokens"
  default_pricing:
    unit: per_million_tokens
    rules:
      - pattern: "*"
        cache_mode: subtract
        in: 1.0
        out: 2.0
        cache_read: 0.0
        cache_write: 0.0
  output_attrs:
    total: "_signoz.gen_ai.total_cost"

# Invalid: unsupported unit.
signozllmcost/bad_unit:
  attrs:
    model: "gen_ai.request.model"
  default_pricing:
    unit: per_request
    rules:
      - pattern: "*"
        cache_mode: subtract
        in: 1.0
        out: 2.0
        cache_read: 0.0
        cache_write: 0.0
  output_attrs:
    total: "_signoz.gen_ai.total_cost"

# Invalid: missing pattern.
signozllmcost/no_pattern:
  attrs:
    model: "gen_ai.request.model"
  default_pricing:
    unit: per_million_tokens
    rules:
      - pattern: ""
        cache_mode: subtract
        in: 1.0
        out: 2.0
        cache_read: 0.0
        cache_write: 0.0
  output_attrs:
    total: "_signoz.gen_ai.total_cost"

# Invalid: unknown cache_mode.
signozllmcost/bad_cache_mode:
  attrs:
    model: "gen_ai.request.model"
  default_pricing:
    unit: per_million_tokens
    rules:
      - pattern: "*"
        cache_mode: unknown
        in: 1.0
        out: 2.0
        cache_read: 0.0
        cache_write: 0.0
  output_attrs:
    total: "_signoz.gen_ai.total_cost"

# Invalid: missing output_attrs.total.
signozllmcost/no_total_output:
  attrs:
    model: "gen_ai.request.model"
  default_pricing:
    unit: per_million_tokens
    rules:
      - pattern: "*"
        cache_mode: subtract
        in: 1.0
        out: 2.0
        cache_read: 0.0
        cache_write: 0.0
  output_attrs:
    total: ""
