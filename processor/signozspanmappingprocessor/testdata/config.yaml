# Full valid config — llm + agent + tool groups matching the spec.
signozspanmapper:
  groups:
    - id: llm
      exists_any:
        attributes:
          - "model"
        resource:
          - "service.name"
      attributes:
        - target: gen_ai.request.model
          context: resource
          sources:
            - gen_ai.llm.model
            - llm.model
            - resource.service.name
        - target: gen_ai.request.tokens
          sources:
            - gen_ai.request_tokens
            - llm.tokens
        - target: gen_ai.request.input
          action: move
          sources:
            - gen_ai.input
            - llm.input

    - id: agent
      exists_any:
        attributes:
          - "agent."
      attributes:
        - target: gen_ai.agent.name
          sources:
            - agent.name
            - llm.agent.name
        - target: gen_ai.agent.id
          sources:
            - gen_ai.agent.id
            - llm.agent.id

    - id: tool
      exists_any:
        attributes:
          - "agent."
      attributes:
        - target: gen_ai.tool.name
          sources:
            - ai.tool.name
            - llm.tool.name

# Only resource-based exists_any.
signozspanmapper/resource_only:
  groups:
    - id: res
      exists_any:
        resource:
          - "service"
      attributes:
        - target: gen_ai.service
          sources:
            - resource.service.name

# Defaults: no action, no context — must accept as valid.
signozspanmapper/defaults:
  groups:
    - id: defaults
      exists_any:
        attributes:
          - "*"
      attributes:
        - target: dst
          sources:
            - src

# Invalid: exists_any has no patterns at all.
signozspanmapper/no_patterns:
  groups:
    - id: bad
      exists_any: {}
      attributes:
        - target: dst
          sources:
            - src

# Invalid: malformed glob pattern.
signozspanmapper/bad_glob:
  groups:
    - id: bad
      exists_any:
        attributes:
          - "[unclosed"
      attributes:
        - target: dst
          sources:
            - src

# Invalid: empty target.
signozspanmapper/empty_target:
  groups:
    - id: bad
      exists_any:
        attributes:
          - "*"
      attributes:
        - target: ""
          sources:
            - src

# Invalid: no sources.
signozspanmapper/no_sources:
  groups:
    - id: bad
      exists_any:
        attributes:
          - "*"
      attributes:
        - target: dst
          sources: []

# Invalid: unknown context value.
signozspanmapper/bad_context:
  groups:
    - id: bad
      exists_any:
        attributes:
          - "*"
      attributes:
        - target: dst
          context: span
          sources:
            - src

# Invalid: unknown action value.
signozspanmapper/bad_action:
  groups:
    - id: bad
      exists_any:
        attributes:
          - "*"
      attributes:
        - target: dst
          action: delete
          sources:
            - src
